<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f9bc7"/>
      <stop offset="0.5" stop-color="#0a3145"/>
      <stop offset="1" stop-color="#120c08"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="docket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f9bc7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2f9bc7" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#halo)"/>
  <text x="40" y="90" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-20 40 90)">§</text><text x="251" y="457" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(3 251 457)">§</text><text x="462" y="824" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-14 462 824)">§</text><text x="673" y="1191" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(9 673 1191)">§</text><text x="884" y="1558" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-8 884 1558)">§</text><text x="15" y="5" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(15 15 5)">§</text><text x="226" y="372" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-2 226 372)">§</text><text x="437" y="739" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-19 437 739)">§</text><text x="648" y="1106" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(4 648 1106)">§</text><text x="859" y="1473" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-13 859 1473)">§</text><text x="1070" y="1840" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(10 1070 1840)">§</text><text x="201" y="287" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-7 201 287)">§</text><text x="412" y="654" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(16 412 654)">§</text><text x="623" y="1021" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-1 623 1021)">§</text><text x="834" y="1388" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(-18 834 1388)">§</text><text x="1045" y="1755" font-family="Georgia, serif" font-size="120" fill="#fffcf3" opacity="0.04" transform="rotate(5 1045 1755)">§</text>

  <!-- Header (top safe zone) -->
  <text x="540" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="900" letter-spacing="3" fill="#fffcf3">REPEAL THE OBEAH ACT</text>
  <text x="540" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="25" font-style="italic" fill="#ffe9b0">Ụnụchi Foundation · Constitutional Challenge</text>

  <!-- Card body -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="286" width="920" height="1348" rx="42" fill="#fffcf3"/>
    <rect x="92" y="298" width="896" height="1324" rx="32" fill="none" stroke="#2f9bc7" stroke-width="10"/>
    <rect x="106" y="312" width="868" height="1296" rx="24" fill="none" stroke="#d9b03a" stroke-width="2"/>
  </g>

  <!-- Top banner -->
  <rect x="126" y="336" width="828" height="118" rx="20" fill="#2f9bc7"/>
  <circle cx="190" cy="395" r="44" fill="#fffcf3"/>
  <g transform="translate(150,355) scale(0.4)"><path d="M100 24 C70 78 58 104 70 132 A40 40 0 0 0 130 132 C140 106 130 78 100 24 Z" fill="#2f9bc7"/>
        <path d="M24 170 Q70 130 100 158 Q140 124 176 170 Z" fill="#2f9bc7" opacity="0.55"/>
        <line x1="24" y1="170" x2="176" y2="170" stroke="#2f9bc7" stroke-width="8"/></g>
  <text x="256" y="382" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" letter-spacing="3" font-weight="800">ORIÈ-ÀFỌ̀ LENS</text>
  <text x="256" y="420" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-style="italic" opacity="0.92">Water + Earth · The Cost</text>
  <path d="M904 369 L930 395 L904 421 L878 395 Z" fill="#ffe9b0" stroke="#fffcf3" stroke-width="3"/>
    <path d="M878 395 L930 395 M904 369 L904 421" stroke="#fffcf3" stroke-width="2" opacity="0.7"/>

  <!-- Jersey violation number -->
  <circle cx="930" cy="356" r="62" fill="#1a0f06"/>
  <circle cx="930" cy="356" r="62" fill="none" stroke="#d9b03a" stroke-width="5"/>
  <text x="930" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#fffcf3">11</text>
  <text x="930" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#d9b03a">OF 13</text>

  <!-- Docket: section clash -->
  <rect x="126" y="482" width="828" height="250" rx="24" fill="url(#docket)" stroke="#2f9bc7" stroke-width="3"/>
  <text x="540" y="552" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" letter-spacing="3" fill="#9b8a6a" font-weight="700">THE CLASH</text>
  <text x="540" y="604" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="#1a0f06">Obeah Act § 10</text>
  <text x="540" y="644" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-style="italic" fill="#2f9bc7">violates</text>
  <text x="540" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#1a0f06">Constitution § 13(3)(c)</text>
  <g transform="translate(858,542) rotate(-11)">
    <rect x="-150" y="-40" width="300" height="80" rx="10" fill="none" stroke="#b00d0d" stroke-width="6" opacity="0.85"/>
    <text x="0" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="900" letter-spacing="6" fill="#b00d0d" opacity="0.88">VIOLATION</text>
  </g>

  <!-- Name plate: the right -->
  <text x="126" y="802" font-family="Arial, sans-serif" font-size="50" font-weight="900" fill="#1a0f06">Freedom of expression</text>

  <!-- Count-up strip -->
  <rect x="126" y="830" width="828" height="92" rx="16" fill="#1a0f06"/>
  <text x="154" y="870" font-family="Arial, sans-serif" font-size="20" letter-spacing="2" fill="#d9b03a" font-weight="700">DAYS OF INACTION</text>
  <text x="154" y="906" font-family="Arial, sans-serif" font-size="22" fill="#cbb89a">filed 16 May 2025 — and counting</text>
  <text x="926" y="894" text-anchor="end" font-family="Arial, sans-serif" font-size="58" font-weight="900" fill="#ffffff">392</text>

  <!-- Flavor: legal text or plain-English -->
  <text x="126" y="982" font-family="Georgia, serif" font-size="40" font-style="italic" font-weight="600" fill="#241a10"><tspan x="126" dy="0">“Speaking about the practice</tspan><tspan x="126" dy="54">at all is suppressed.”</tspan></text>

  <!-- Lens voice -->
  <text x="126" y="1136" font-family="Georgia, serif" font-size="25" font-style="italic" fill="#2f9bc7"><tspan x="126" dy="0">Water and earth hold the human cost — who is</tspan><tspan x="126" dy="34">harmed, and the ground we stand on.</tspan></text>

  <!-- Footer -->
  <line x1="126" y1="1518" x2="954" y2="1518" stroke="#e0d6bf" stroke-width="2"/>
  <text x="126" y="1568" font-family="Arial, sans-serif" font-size="32" font-weight="900" letter-spacing="3" fill="#1a0f06">IGBOKAL</text>
  <text x="540" y="1566" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="2" fill="#2f9bc7">#REPEAL13</text>
  <text x="954" y="1568" text-anchor="end" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#6b5c4a">Moon 11 of 13</text>

  <!-- Bottom CTA (bottom safe zone) -->
  <text x="540" y="1824" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#fffcf3" opacity="0.9" letter-spacing="1" font-weight="700">SIGN · EMAIL THE AG · SHARE</text>
  <text x="540" y="1864" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffe9b0" opacity="0.85" letter-spacing="1">change.org → repeal the 1898 Obeah law</text>
</svg>